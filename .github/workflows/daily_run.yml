name: Daily NIO Scraper

on:
  schedule:
    # 每天北京时间 20:00 运行 (UTC 12:00)
    - cron: '0 12 * * *'
  workflow_dispatch: # 允许手动点击运行

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run scraper
        run: python scraper.py

      # 👇 【新功能】如果爬虫失败了，把截图上传到 GitHub 供你下载查看
      - name: Upload Error Screenshot
        if: failure() # 只有上面的步骤失败时才运行这一步
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error_screenshot.png

      - name: Commit and push data
        # 只有当前面的步骤都成功时，才运行这一步
        if: success() 
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 检查 CSV 文件是否存在
          if [ -f nio_power_data.csv ]; then
            git add nio_power_data.csv
            # 只有当文件有变化时才提交，防止空提交报错
            git commit -m "Update NIO data: $(date +'%Y-%m-%d')" || echo "无数据变化，跳过提交"
            git push
          else
            echo "⚠️ 文件 nio_power_data.csv 不存在，跳过提交步骤。"
          fi
