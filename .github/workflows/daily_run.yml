name: Daily NIO Scraper

on:
  schedule:
    # 每天北京时间 20:00 运行 (UTC 12:00)
    - cron: '0 12 * * *'
  workflow_dispatch: # 允许手动点击运行

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run scraper
        run: python scraper.py

      # 👇 【新功能】如果爬虫失败了，把截图上传到 GitHub 供你下载查看
      - name: Upload Error Screenshot
        if: failure() # 只有上面的步骤失败时才运行这一步
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error_screenshot.png

      - name: Commit and push data
        if: success()
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          if [ -f nio_power_data.csv ]; then
            git add nio_power_data.csv
            git commit -m "Update NIO data: $(date +'%Y-%m-%d')" || echo "无数据变化"
            
            # 👇👇👇 关键修改：先拉取远程最新代码，再推送 👇👇👇
            git pull --rebase origin main
            git push origin main
          else
            echo "⚠️ 文件不存在，跳过"
          fi
