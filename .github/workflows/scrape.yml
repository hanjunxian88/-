name: Daily NIO Scraper

on:
  schedule:
    # 北京时间 00:00 = UTC时间 16:00 (前一天)
    # 所以我们要设在 UTC 16:00 运行
    - cron: '0 16 * * *'
  # 允许你手动点击按钮测试
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code (拉取代码)
      uses: actions/checkout@v3

    - name: Set up Python (安装 Python)
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies (安装依赖)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 安装 Playwright 对应的浏览器内核
        playwright install chromium
        playwright install-deps

    - name: Run scraper (运行爬虫)
      run: python scraper.py

    - name: Commit and push if changed (提交并保存数据)
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add nio_power_data.csv
        # 如果有数据更新，就提交；如果没有，就不报错
        git commit -m "Auto-update NIO data" || exit 0
        git push
